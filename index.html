<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avilio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 300vh; /* Altura para permitir desplazamiento */
      padding: 20px;
    }

    .panel {
  /* Configuración base del panel */
  width: 90%;
  max-width: 400px;
  margin: 20px 0;
  padding: 20px;
  backdrop-filter: blur(0px);
  background: rgba(255, 255, 255, 0.05);
  border-radius: 15px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 15px;
  position: relative; /* Necesario para posicionar elementos dentro del panel */
}

.clickable-container {
  position: relative;
  display: flex;
  justify-content: center; /* Centra en el eje X */
  align-items: center; /* Centra en el eje Y */
  height: 150px; /* Altura del contenedor */
}

.clickable-image {
  display: inline-block;
  cursor: pointer;
  transition: transform 0.2s;
  max-width: 200px; /* Cambia el tamaño máximo */
  width: 100%; /* Se adapta al contenedor */
}

.clickable-image:hover {
  transform: scale(1.1);
}

    .panel img, .panel video {
      max-width: 100%;
      border-radius: 10px;
    }

    .panel .clickable-image {
      display: inline-block;
      cursor: pointer;
      transition: transform 0.2s;
      max-width: 100px; /* Cambia el tamaño máximo */
      width: 100%; /* Se adapta al ancho del contenedor */
    }

    .panel .clickable-image:hover {
      transform: scale(1.1);
    }

    .audio-controls {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .audio-controls button {
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background-color: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
      border-radius: 5px;
      cursor: pointer;
    }

    .audio-controls button:hover {
      background-color: rgba(255, 255, 255, 0.7);
      color: black;
    }
  </style>
</head>
<body>
  <canvas id="background"></canvas>

  <div class="audio-controls">
    <button id="playPauseButton">Reproducir</button>
  </div>

  <div class="container">
    <!-- Panel 1 -->
    <div class="panel">
        <img src="casa.jpg" alt="Imagen estática">
        <video src="local.mp4" controls></video>
        <div class="clickable-container">
          <a href="https://www.example.com" target="_blank">
            <img class="clickable-image" src="comprar.png" alt="Imagen clickeable">
          </a>
        </div>
      </div>

    <!-- Panel 2 -->
    <div class="panel">
        <img src="casa.jpg" alt="Imagen estática">
        <video src="local.mp4" controls></video>
        <div class="clickable-container">
          <a href="https://www.example.com" target="_blank">
            <img class="clickable-image" src="comprar.png" alt="Imagen clickeable">
          </a>
        </div>
      </div>

    <!-- Panel 3 -->
    <div class="panel">
        <img src="casa.jpg" alt="Imagen estática">
        <video src="local.mp4" controls></video>
        <div class="clickable-container">
          <a href="https://www.example.com" target="_blank">
            <img class="clickable-image" src="comprar.png" alt="Imagen clickeable">
          </a>
        </div>
      </div>
      

  <audio id="audio" src="beyond_dreams.mp3"></audio>
  <script type="module">
    import { AudioAnalyzer } from './js/AudioAnalyzer.js';
    import { Particle } from './js/Particle.js';

    const canvas = document.getElementById('background');
    const ctx = canvas.getContext('2d');
    const audioElement = document.getElementById('audio');
    const playPauseButton = document.getElementById('playPauseButton');
    const analyzer = new AudioAnalyzer(audioElement);

    const particles = [];
    for (let i = 0; i < 200; i++) {
      particles.push(new Particle(window.innerWidth, window.innerHeight));
    }

    async function init() {
      await analyzer.init();

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      animate();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const intensity = analyzer.getIntensity();
      particles.forEach(particle => {
        const { x, y, size } = particle.update(intensity);
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(intensity + 0.5, 1)})`;
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }

    playPauseButton.addEventListener('click', async () => {
      if (analyzer.isPlaying) {
        await analyzer.togglePlay();
        playPauseButton.textContent = 'Reproducir';
      } else {
        await analyzer.togglePlay();
        playPauseButton.textContent = 'Pausar';
      }
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    init();
  </script>
</body>
</html>

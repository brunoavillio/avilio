<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Glass Panels & 3D Music Visualizer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background: #242424;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass-panel {
            width: 90%;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .image-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 10px 0;
        }

        .static-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .clickable-image {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
        }

        video {
            width: 80%;
            border-radius: 10px;
            object-fit: cover;
        }

        #playButton {
            margin: 20px 0;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        @media only screen and (max-width: 768px) {
            .glass-panel {
                width: 95%;
                margin: 10px auto;
                padding: 5px;
            }

            .image-container {
                width: 80px;
                height: 80px;
            }

            .clickable-image {
                width: 30px;
                height: 30px;
            }

            video {
                width: 90%;
            }

            #playButton {
                font-size: 14px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="glass-panel">
        <div class="image-container">
            <a href="https://ejemplo.com" target="_blank">
                <img class="clickable-image" src="comprar.png" alt="Comprar">
            </a>
            <img class="static-image" src="casa.jpg" alt="Casa">
        </div>
        <video controls>
            <source src="local.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de videos.
        </video>
    </div>

    <button id="playButton">Reproducir</button>

    <script type="module">
        import { Particle } from './js/Particle.js';
        import { AudioAnalyzer } from './js/AudioAnalyzer.js';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = new Audio('beyond_dreams.mp3');
        const playButton = document.getElementById('playButton');

        const audioAnalyzer = new AudioAnalyzer(audio);
        const particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particleCount = Math.floor((canvas.width * canvas.height) / 3500);
            particles.length = 0;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(canvas.width, canvas.height));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const intensity = audioAnalyzer.getIntensity();

            particles.forEach(particle => {
                const projection = particle.update(intensity);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, intensity + 0.3)})`;
                ctx.beginPath();
                ctx.arc(projection.x, projection.y, projection.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        playButton.addEventListener('click', async () => {
            if (audio.paused) {
                try {
                    await audioAnalyzer.togglePlay();
                    playButton.textContent = 'Pausar';
                } catch (err) {
                    console.error(err);
                }
            } else {
                audio.pause();
                playButton.textContent = 'Reproducir';
            }
        });

        resizeCanvas();
        animate();

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
